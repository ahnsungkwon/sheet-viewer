<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>수정보완건</title>
<link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f2f5;--card:#ffffff;--text:#0f1117;--sub:#6b7280;--muted:#9ca3af;--border:rgba(0,0,0,0.06);
  --accent:#2563eb;--accent-light:#eff6ff;--accent-muted:#bfdbfe;
  --before-c:#475569;--before-bg:#f1f5f9;--before-bd:#e2e8f0;
  --after-c:#fff;--after-bg:linear-gradient(135deg,#ea580c,#f97316);--after-bd:#f97316;
  --after-card:#fff7ed;--after-card-bd:#fed7aa;--after-text:#9a3412;--after-sub:rgba(154,52,18,0.7);
  --erp-sec-bg:#f5f3ff;--erp-sec-bd:#ddd6fe;--erp-sec-c:#6d28d9;--erp-card:#fff;--erp-card-bd:#ede9fe;
  --cancel-c:#dc2626;--change-c:#d97706;--supp-c:#059669;--erp-c:#7c3aed;
  --cancel-bg:#fef2f2;--change-bg:#fffbeb;--supp-bg:#ecfdf5;--erp-bg:#f5f3ff;
  --done:#059669;--done-bg:#ecfdf5;--undone:#dc2626;--undone-bg:#fef2f2;
  --r:14px;--rs:10px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow:0 4px 16px rgba(0,0,0,0.07),0 1px 4px rgba(0,0,0,0.04);
}
[data-theme="dark"]{
  --bg:#0e0f14;--card:#1a1b22;--text:#f1f5f9;--sub:#94a3b8;--muted:#64748b;--border:rgba(255,255,255,0.06);
  --accent:#60a5fa;--accent-light:#1e3a5f;--accent-muted:#1e40af;
  --before-c:#94a3b8;--before-bg:#1e2330;--before-bd:#2d3748;
  --after-bg:linear-gradient(135deg,#92400e,#c2410c);--after-bd:#c2410c;
  --after-card:#2d1a0a;--after-card-bd:#7c2d12;--after-text:#fed7aa;--after-sub:rgba(254,215,170,0.7);
  --erp-sec-bg:#1e1a2e;--erp-sec-bd:#4c1d95;--erp-sec-c:#a78bfa;--erp-card:#1e1a2e;--erp-card-bd:#3b1f6e;
  --cancel-c:#f87171;--change-c:#fbbf24;--supp-c:#34d399;--erp-c:#a78bfa;
  --cancel-bg:#2d1515;--change-bg:#2d2208;--supp-bg:#0d2a1e;--erp-bg:#1e1a2e;
  --done:#34d399;--done-bg:#0d2a1e;--undone:#f87171;--undone-bg:#2d1515;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.3),0 1px 2px rgba(0,0,0,0.2);
  --shadow:0 4px 16px rgba(0,0,0,0.4),0 1px 4px rgba(0,0,0,0.2);
}

body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;overflow-x:hidden;transition:background .3s,color .3s}

.app{max-width:480px;margin:0 auto;min-height:100vh}

.top{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);transition:background .3s;box-shadow:var(--shadow-sm)}
[data-theme="dark"] .top{background:rgba(14,15,20,0.85)}

.hd{padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.ht{font-size:18px;font-weight:900;letter-spacing:-0.5px}.ht em{font-style:normal;color:var(--accent)}
.hs{font-size:11px;color:var(--muted);font-weight:500;flex:1;text-align:center}
.ha{display:flex;gap:6px}
.hb{cursor:pointer;width:34px;height:34px;border-radius:10px;border:none;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--bg);color:var(--text);transition:all .15s;box-shadow:var(--shadow-sm)}
.hb:active{transform:scale(0.92)}

.tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 12px;gap:4px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 12px;font-size:13px;font-weight:700;color:var(--muted);border-radius:10px;cursor:pointer;transition:all .15s;white-space:nowrap;margin-bottom:8px}
.tab.on{background:var(--accent-light);color:var(--accent)}
.tab .n{display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;background:var(--muted);color:var(--card);padding:0 5px;height:16px;border-radius:8px;margin-left:4px;min-width:16px}
.tab.on .n{background:var(--accent);color:#fff}

.sa{display:flex;flex-direction:column;align-items:center;padding:2px 0 8px}
.sz{width:100%;height:32px;display:flex;align-items:center;justify-content:center;cursor:grab;touch-action:pan-y;user-select:none;position:relative}
.szb{width:40px;height:4px;border-radius:2px;background:var(--border);transition:background .15s}
.sz.dg .szb{background:var(--accent)}
.sar{position:absolute;top:50%;transform:translateY(-50%);color:var(--accent);font-size:18px;font-weight:700;opacity:0;transition:opacity .15s}.sar.l{left:24px}.sar.r{right:24px}
.dots{display:flex;gap:4px;justify-content:center;padding-bottom:2px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--border);transition:all .25s}
.dot.on{width:18px;border-radius:3px;background:var(--accent)}

.ca{padding:12px 0 56px;transition:opacity .15s,transform .15s}
.ca.ol{opacity:0;transform:translateX(-24px)}.ca.or{opacity:0;transform:translateX(24px)}

.cr{display:flex;gap:8px;padding:0 16px 10px}
.ct{flex:1;text-align:center;padding:10px 4px;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;background:var(--card);color:var(--muted);border:none;transition:all .15s;box-shadow:var(--shadow-sm)}
.ct.on{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,0.3)}

.sb{display:grid;grid-template-columns:repeat(4,1fr);margin:0 16px 10px;padding:14px 8px;background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-sm);text-align:center}
.si{display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
.si+.si::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);height:24px;width:1px;background:var(--border)}
.sn{font-weight:900;font-size:20px;line-height:1}
.sl{font-size:10px;font-weight:600;color:var(--muted)}

.ps{margin:0 16px 10px;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.ph{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;font-size:13px;font-weight:800;letter-spacing:-0.1px}
.ph.bf{background:var(--before-bg);color:var(--before-c)}
.pc{font-size:11px;font-weight:500;opacity:.6}
.pb{padding:8px 8px}
.ps.af-sec .ph{background:var(--after-bg);color:var(--after-c)}
.ps.af-sec .pb{background:var(--after-card)}
.ps.af-sec .cl{background:rgba(154,52,18,0.12);color:var(--after-text)}
.ps.af-sec .ir{background:var(--card);border:1px solid var(--after-card-bd)}
.ps.af-sec .in{color:var(--after-text)}
.ps.af-sec .ig{background:rgba(154,52,18,0.1);color:var(--after-text)}
.ps.af-sec .id{color:var(--after-sub)}
.ps.af-sec .is.dn{background:rgba(5,150,105,0.15);color:#059669}
.ps.af-sec .is.un{background:rgba(220,38,38,0.12);color:#dc2626}
.ps.erp-sec .ph{background:var(--erp-sec-bg);color:var(--erp-sec-c)}
.ps.erp-sec .pb{background:var(--erp-sec-bg)}
.ps.erp-sec .cl{background:rgba(109,40,217,0.1);color:var(--erp-sec-c)}
.ps.erp-sec .ir{background:var(--erp-card);border:1px solid var(--erp-card-bd)}
.ps.erp-sec .in{color:var(--erp-sec-c)}
.ps.erp-sec .ig{background:rgba(109,40,217,0.1);color:var(--erp-sec-c)}
.ps.erp-sec .id{color:var(--sub)}

.cg{margin-bottom:6px}
.cl{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;margin-bottom:4px;letter-spacing:0.1px}
.cl.cancel{background:var(--cancel-bg);color:var(--cancel-c)}
.cl.change{background:var(--change-bg);color:var(--change-c)}
.cl.supplement{background:var(--supp-bg);color:var(--supp-c)}
.cl.erp{background:var(--erp-bg);color:var(--erp-c)}

.ir{display:flex;align-items:center;gap:7px;padding:8px 10px;margin:3px 0;background:var(--card);border-radius:var(--rs);font-size:13px;transition:background .3s;box-shadow:var(--shadow-sm)}
.in{font-weight:800;flex-shrink:0;font-size:13px}
.ig{font-size:10px;font-weight:800;background:var(--accent-light);color:var(--accent);padding:2px 6px;border-radius:6px;flex-shrink:0;letter-spacing:0.1px}
.id{color:var(--sub);font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.is{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;flex-shrink:0;letter-spacing:0.1px}
.is.dn{background:var(--done-bg);color:var(--done)}
.is.un{background:var(--undone-bg);color:var(--undone)}

@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="hd">
      <div class="ht"><em>수정보완건</em></div>
      <div class="hs" id="hs"></div>
      <div class="ha"><div class="hb" onclick="tog()"><span id="ti">🌙</span></div><div class="hb" onclick="load()">↻</div></div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="sa">
      <div class="sz" id="sz"><span class="sar l" id="al">◂</span><div class="szb"></div><span class="sar r" id="ar">▸</span></div>
      <div class="dots" id="dots"></div>
    </div>
  </div>
  <div id="msg"></div>
  <div class="ca" id="ca"></div>
</div>
<script>
var API='https://script.google.com/macros/s/AKfycbwFLkJFrnXzaRUruG1OscqQTMDMroCJwilsZetxsz71GhcAZf9kZfoV0xvzhUTkms2-/exec';
var S=[],ti=0,ci=[];

function tog(){var h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');document.getElementById('ti').textContent=d?'🌙':'☀️';try{localStorage.setItem('t',d?'l':'d')}catch(e){}}
try{if(localStorage.getItem('t')==='d'){document.documentElement.setAttribute('data-theme','dark');window.addEventListener('DOMContentLoaded',function(){document.getElementById('ti').textContent='☀️'})}}catch(e){}

function pn(raw){if(!raw)return{n:'',g:0};var s=String(raw).trim(),m=s.match(/^(\d+)(.+)$/);return m?{n:m[2],g:parseInt(m[1])}:{n:s,g:0}}

async function load(){
  var m=document.getElementById('msg');
  m.innerHTML='<div style="text-align:center;padding:72px 20px;color:var(--muted)"><div style="width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px"></div><span style="font-size:13px;font-weight:600">불러오는 중...</span></div>';
  try{
    var r=await fetch(API);var d=await r.json();
    if(!d||!d.length){m.innerHTML='<div style="text-align:center;padding:72px;color:var(--muted);font-weight:600;font-size:14px">데이터 없음</div>';return}
    S=d;ti=0;ci=S.map(function(){return 0});
    if(S.length)document.getElementById('hs').textContent=S[0].date+' · '+S[0].org;
    m.innerHTML='';ren();
  }catch(e){m.innerHTML='<div style="text-align:center;padding:72px;color:var(--cancel-c)"><span style="font-size:14px;font-weight:700">불러오기 실패</span><br><br><button onclick="load()" style="padding:10px 24px;border-radius:12px;border:none;background:var(--card);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;box-shadow:var(--shadow-sm)">다시 시도</button></div>'}
}

function cnt(s){var n=0;s.cases.forEach(function(c){['before','after'].forEach(function(p){['cancel','change','supplement','erp'].forEach(function(k){n+=c[p][k].length})});});return n}

function ren(){
  if(!S.length)return;
  document.getElementById('tabs').innerHTML=S.map(function(s,i){return'<div class="tab '+(i===ti?'on':'')+'" onclick="go('+i+')">'+s.date+' '+s.org+'<span class="n">'+cnt(s)+'</span></div>'}).join('');
  setTimeout(function(){var a=document.querySelector('.tab.on');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},80);
  document.getElementById('dots').innerHTML=S.map(function(_,i){return'<div class="dot '+(i===ti?'on':'')+'"></div>'}).join('');
  rc();
}

function rc(){
  var sh=S[ti],c=ci[ti],cas=sh.cases[c];
  var ac={cancel:0,change:0,supplement:0,erp:0};
  ['before','after'].forEach(function(p){['cancel','change','supplement','erp'].forEach(function(k){ac[k]+=cas[p][k].length})});

  var ch='';
  if(sh.cases.length>1)ch='<div class="cr">'+sh.cases.map(function(x,j){return'<div class="ct '+(j===c?'on':'')+'" onclick="pc('+j+')">'+x.no+'차</div>'}).join('')+'</div>';

  var sm='<div class="sb">'
    +'<div class="si"><span class="sn" style="color:var(--cancel-c)">'+ac.cancel+'</span><span class="sl">취소</span></div>'
    +'<div class="si"><span class="sn" style="color:var(--change-c)">'+ac.change+'</span><span class="sl">변경</span></div>'
    +'<div class="si"><span class="sn" style="color:var(--supp-c)">'+ac.supplement+'</span><span class="sl">보완</span></div>'
    +'<div class="si"><span class="sn" style="color:var(--erp-c)">'+ac.erp+'</span><span class="sl">오등록</span></div>'
    +'</div>';

  var bfData={cancel:cas.before.cancel,change:cas.before.change,supplement:cas.before.supplement};
  var afData={cancel:cas.after.cancel,change:cas.after.change,supplement:cas.after.supplement};
  var bfTot=bfData.cancel.length+bfData.change.length+bfData.supplement.length;
  var afTot=afData.cancel.length+afData.change.length+afData.supplement.length;
  var bfHtml=bfTot>0?buildBox(bfData,'bf',bfTot,'입력 전',''):'';
  var afHtml=afTot>0?buildBox(afData,'af',afTot,'입력 후',' af-sec'):'';

  var allErp=cas.before.erp.concat(cas.after.erp);
  var erpHtml=allErp.length>0?buildErpBox(allErp):'';

  document.getElementById('hs').textContent=sh.date+' · '+sh.org;
  document.getElementById('ca').innerHTML=ch+sm+bfHtml+afHtml+erpHtml;
}

function buildBox(items,cls,tot,lbl,extra){
  var b='';
  b+=bc('취소','cancel',items.cancel);
  b+=bc('변경/추가','change',items.change);
  b+=bc('보완','supplement',items.supplement);
  if(!b)return'';
  return'<div class="ps'+extra+'"><div class="ph '+cls+'"><span>'+lbl+'</span><span class="pc">'+tot+'건</span></div><div class="pb">'+b+'</div></div>';
}

function buildErpBox(items){
  var rows=items.map(function(it){
    var p=pn(it.name);
    var nm=p.n?'<span class="in">'+p.n+'</span>':'<span class="in" style="opacity:0.5">미입력</span>';
    var gz=p.g?'<span class="ig">'+p.g+'구좌</span>':'';
    var dt=it.detail?'<span class="id">'+it.detail+'</span>':'';
    return'<div class="ir">'+nm+gz+dt+'</div>';
  }).join('');
  return'<div class="ps erp-sec"><div class="ph"><span>오등록 (ERP)</span><span class="pc">'+items.length+'건</span></div><div class="pb">'+rows+'</div></div>';
}

function bc(lbl,type,items){
  if(!items||!items.length)return'';
  var rows=items.map(function(it){
    var p=pn(it.name);
    var nm=p.n?'<span class="in">'+p.n+'</span>':'<span class="in" style="color:var(--muted)">미입력</span>';
    var gz=p.g?'<span class="ig">'+p.g+'구좌</span>':'';
    if(type==='change'){var dt=it.detail?'<span class="id">'+it.detail+'</span>':'';return'<div class="ir">'+nm+gz+dt+'</div>'}
    if(type==='cancel'){var dt2=it.detail?'<span class="id">'+it.detail+'</span>':'';return'<div class="ir">'+nm+gz+dt2+'</div>'}
    if(type==='supplement'){var dn=it.done||(it.result&&it.result.indexOf('완료')>-1);var st=dn?'<span class="is dn">등록완료</span>':'<span class="is un">미완료</span>';var dt3=it.detail?'<span class="id">'+it.detail+'</span>':'';return'<div class="ir">'+nm+gz+dt3+st+'</div>'}
    return'';
  }).join('');
  return'<div class="cg"><div class="cl '+type+'">'+lbl+' '+items.length+'</div>'+rows+'</div>';
}

function go(i){if(i<0||i>=S.length||i===ti)return;var el=document.getElementById('ca'),dir=i>ti?'ol':'or';el.classList.add(dir);setTimeout(function(){ti=i;ren();el.classList.remove(dir);window.scrollTo({top:0,behavior:'smooth'})},150)}
function pc(i){ci[ti]=i;rc()}

var sx=0,cx=0,dr=false,TH=50,z=document.getElementById('sz');
z.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;cx=sx;dr=true;z.classList.add('dg')},{passive:true});
z.addEventListener('touchmove',function(e){if(!dr)return;cx=e.touches[0].clientX;var d=cx-sx;document.getElementById('al').style.opacity=d>20?'1':'0';document.getElementById('ar').style.opacity=d<-20?'1':'0'},{passive:true});
z.addEventListener('touchend',function(){if(!dr)return;dr=false;z.classList.remove('dg');var d=cx-sx;if(d<-TH&&ti<S.length-1)go(ti+1);else if(d>TH&&ti>0)go(ti-1);document.getElementById('al').style.opacity='0';document.getElementById('ar').style.opacity='0';sx=0;cx=0});
var md=false,ms=0,mc=0;
z.addEventListener('mousedown',function(e){md=true;ms=e.clientX;mc=ms;z.classList.add('dg')});
z.addEventListener('mousemove',function(e){if(!md)return;mc=e.clientX;var d=mc-ms;document.getElementById('al').style.opacity=d>20?'1':'0';document.getElementById('ar').style.opacity=d<-20?'1':'0'});
z.addEventListener('mouseup',function(){if(!md)return;md=false;z.classList.remove('dg');var d=mc-ms;if(d<-TH&&ti<S.length-1)go(ti+1);else if(d>TH&&ti>0)go(ti-1);document.getElementById('al').style.opacity='0';document.getElementById('ar').style.opacity='0'});
z.addEventListener('mouseleave',function(){if(md){md=false;z.classList.remove('dg');document.getElementById('al').style.opacity='0';document.getElementById('ar').style.opacity='0'}});

load();
</script>
</body>
</html>
