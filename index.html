<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>수정보완건 뷰어</title>
<link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--bg:#f4f3f0;--card:#ffffff;--text:#1a1a1a;--sub:#555;--muted:#999;
--border:#e5e3de;
--accent:#2b5592;--accent-light:#eaf1fb;
--before:#7c6bb5;--before-light:#f0edfa;
--after:#2e8b6a;--after-light:#e8f6f0;
--cancel-c:#c74444;--cancel-bg:#fce8e8;
--change-c:#b87a1a;--change-bg:#fef4de;
--supplement-c:#1e8858;--supplement-bg:#e5f5ed;
--erp-c:#6060b0;--erp-bg:#eeeef8;
--done:#1e8858;--done-bg:#e5f5ed;
--undone:#c74444;--undone-bg:#fce8e8;
--r:14px;--rs:10px;
}

[data-theme="dark"]{
--bg:#1a1a1e;--card:#26262b;--text:#e8e8e8;--sub:#aaa;--muted:#666;
--border:#3a3a40;
--accent:#6ba3e8;--accent-light:#1e2d42;
--before:#a99cdb;--before-light:#2a2540;
--after:#5cbf9a;--after-light:#1a3028;
--cancel-c:#e87070;--cancel-bg:#3a2020;
--change-c:#dba050;--change-bg:#3a2e18;
--supplement-c:#50c080;--supplement-bg:#1a3020;
--erp-c:#9090d0;--erp-bg:#28283a;
--done:#50c080;--done-bg:#1a3020;
--undone:#e87070;--undone-bg:#3a2020;
}

body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;overflow-x:hidden;transition:background .3s,color .3s}
.app{max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden}

.header{background:var(--card);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);transition:background .3s}
.header-inner{padding:16px 16px 0}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
.h-title{font-size:19px;font-weight:800;letter-spacing:-0.5px;flex-shrink:0}
.h-title em{font-style:normal;color:var(--accent)}
.h-sub{font-size:12px;color:var(--muted);font-weight:500;flex:1;text-align:center}
.h-actions{display:flex;gap:6px;flex-shrink:0}
.h-btn{cursor:pointer;padding:5px 10px;border-radius:8px;border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--accent);background:var(--card);transition:all .2s;display:flex;align-items:center;gap:3px}

.tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;gap:0;padding:0 12px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:9px 14px 11px;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2.5px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .cnt{display:inline-block;font-size:10px;font-weight:700;background:var(--border);color:var(--sub);padding:1px 6px;border-radius:7px;margin-left:3px;vertical-align:1px}
.tab.active .cnt{background:var(--accent);color:#fff}

.swipe-zone{height:40px;display:flex;align-items:center;justify-content:center;cursor:grab;touch-action:pan-y;user-select:none;position:relative}
.swipe-zone:active{cursor:grabbing}
.swipe-bar{width:48px;height:5px;border-radius:3px;background:var(--border);transition:background .15s}
.swipe-zone:active .swipe-bar,.swipe-zone.dragging .swipe-bar{background:var(--accent)}
.swipe-arrow{position:absolute;top:50%;transform:translateY(-50%);color:var(--accent);font-size:16px;font-weight:700;opacity:0;transition:opacity .15s}
.swipe-arrow.left{left:20px}
.swipe-arrow.right{right:20px}

.swipe-dots{display:flex;gap:5px;justify-content:center;padding:0 0 4px}
.swipe-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .2s}
.swipe-dot.active{width:18px;border-radius:3px;background:var(--accent)}

.content-area{transition:opacity .15s,transform .15s}
.content-area.out-left{opacity:0;transform:translateX(-30px)}
.content-area.out-right{opacity:0;transform:translateX(30px)}

.phase-toggle{display:flex;gap:0;margin:6px 16px 0;background:var(--bg);border-radius:10px;padding:3px}
.phase-btn{flex:1;text-align:center;padding:7px 0;font-size:12px;font-weight:700;border-radius:8px;cursor:pointer;transition:all .2s;color:var(--muted)}
.phase-btn.active-before{background:var(--before-light);color:var(--before)}
.phase-btn.active-after{background:var(--after-light);color:var(--after)}

.body{padding:10px 16px 80px}
.section{margin-bottom:6px}
.section-head{display:flex;align-items:center;gap:8px;padding:14px 0 8px}
.section-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.section-icon.cancel{background:var(--cancel-bg);color:var(--cancel-c)}
.section-icon.change{background:var(--change-bg);color:var(--change-c)}
.section-icon.supplement{background:var(--supplement-bg);color:var(--supplement-c)}
.section-icon.erp{background:var(--erp-bg);color:var(--erp-c)}
.section-label{font-size:14px;font-weight:700;letter-spacing:-0.3px}
.section-count{font-size:11px;color:var(--muted);font-weight:500}

.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);margin-bottom:6px;overflow:hidden;animation:fadeUp .25s ease both;transition:background .3s,border-color .3s}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card:nth-child(2){animation-delay:.02s}.card:nth-child(3){animation-delay:.04s}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 0}
.card-name{font-size:15px;font-weight:700;letter-spacing:-0.2px}
.card-name.empty{color:var(--muted);font-weight:400;font-style:italic;font-size:13px}
.card-no{font-size:11px;color:var(--muted);font-weight:500}
.card-body{padding:6px 14px 12px}
.detail-row{display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:13px}
.detail-label{flex-shrink:0;width:48px;color:var(--muted);font-weight:600;font-size:11px;padding-top:1px}
.detail-value{color:var(--sub);line-height:1.45;word-break:keep-all}
.detail-value.highlight{color:var(--text);font-weight:600}
.status-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.status-pill.done{background:var(--done-bg);color:var(--done)}
.status-pill.undone{background:var(--undone-bg);color:var(--undone)}
.status-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.change-detail{background:var(--bg);border-radius:var(--rs);padding:8px 12px;margin-top:4px;font-size:12px;line-height:1.5;color:var(--sub)}
.change-detail .cd-row{display:flex;justify-content:space-between;padding:2px 0}
.change-detail .cd-label{color:var(--muted);font-weight:600}
.change-detail .cd-val{font-weight:600;color:var(--text)}
.change-detail .cd-val.add{color:var(--after)}
.change-detail .cd-val.remove{color:var(--cancel-c)}
.empty-section{text-align:center;padding:16px;font-size:13px;color:var(--muted);background:var(--card);border-radius:var(--r);border:1px dashed var(--border)}
.summary-strip{display:flex;gap:4px;padding:8px 16px 2px}
.ss-item{flex:1;background:var(--card);border-radius:var(--rs);padding:10px 6px;text-align:center;border:1px solid var(--border);transition:background .3s,border-color .3s}
.ss-num{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.ss-label{font-size:9px;font-weight:600;color:var(--muted);margin-top:1px;letter-spacing:0.3px}
.case-selector{display:flex;gap:4px;padding:8px 16px 0}
.case-btn{flex:1;text-align:center;padding:8px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;background:var(--card);color:var(--muted);border:1px solid var(--border);transition:all .15s}
.case-btn.active{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div class="header-inner">
      <div class="header-row">
        <div class="h-title"><em>수정보완건</em> 뷰어</div>
        <div class="h-sub" id="hSub"></div>
        <div class="h-actions">
          <div class="h-btn" onclick="toggleTheme()"><span id="themeIcon">🌙</span></div>
          <div class="h-btn" onclick="loadData()">↻</div>
        </div>
      </div>
    </div>
    <div class="tabs" id="mainTabs"></div>
  </div>
  <div class="swipe-zone" id="swipeZone">
    <span class="swipe-arrow left" id="arrowL">◂</span>
    <div class="swipe-bar"></div>
    <span class="swipe-arrow right" id="arrowR">▸</span>
  </div>
  <div class="swipe-dots" id="swipeDots"></div>
  <div id="loadMsg"></div>
  <div class="content-area" id="contentArea"></div>
</div>
<script>
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbzztlXhtV0kALZUZlkKLZpfXCjd5-35N6p-5m9gaL2BhzHFCIFk4ZbYEUI21yJqj2S7_Q/exec';
let SHEETS=[],activeIdx=0,caseIdxMap=[],phaseMap=[];

function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');document.getElementById('themeIcon').textContent=d?'🌙':'☀️';try{localStorage.setItem('theme',d?'light':'dark')}catch(e){}}
try{if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');window.addEventListener('DOMContentLoaded',()=>{document.getElementById('themeIcon').textContent='☀️'})}}catch(e){}

async function loadData(){
  const msg=document.getElementById('loadMsg');
  msg.innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--muted)"><div style="width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px"></div><span style="font-size:13px">불러오는 중...</span></div>';
  try{
    const res=await fetch(APPS_SCRIPT_URL);const data=await res.json();
    if(!data||!data.length){msg.innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--muted)">데이터가 없습니다.</div>';return}
    SHEETS=data;
    var ex=['강연회','강연','회의','메모','목록','설정'];
    SHEETS=SHEETS.filter(s=>{for(var i=0;i<ex.length;i++)if(s.tab.indexOf(ex[i])>-1)return false;return true});
    SHEETS.sort((a,b)=>{var ap=a.date.split('/'),bp=b.date.split('/');return(parseInt(bp[0])*100+parseInt(bp[1]))-(parseInt(ap[0])*100+parseInt(ap[1]))});
    activeIdx=0;caseIdxMap=SHEETS.map(()=>0);phaseMap=SHEETS.map(()=>'before');
    document.getElementById('hSub').textContent=SHEETS[0].date+' 기준';
    msg.innerHTML='';renderTabs();renderDots();renderContent();
  }catch(err){msg.innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--cancel-c)"><span style="font-size:13px">불러오기 실패</span><br><br><button onclick="loadData()" style="padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer">다시 시도</button></div>'}
}

function countItems(s){let n=0;s.cases.forEach(c=>{['before','after'].forEach(p=>{['cancel','change','supplement','erp'].forEach(k=>{n+=c[p][k].length})})});return n}
function countPhase(c,p){let n=0;['cancel','change','supplement','erp'].forEach(k=>{n+=c[p][k].length});return n}

function renderTabs(){
  document.getElementById('mainTabs').innerHTML=SHEETS.map((s,i)=>`<div class="tab ${i===activeIdx?'active':''}" onclick="goTo(${i})">${s.date} ${s.org}<span class="cnt">${countItems(s)}</span></div>`).join('');
  setTimeout(()=>{const a=document.querySelector('#mainTabs .tab.active');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},80);
}
function renderDots(){document.getElementById('swipeDots').innerHTML=SHEETS.map((_,i)=>`<div class="swipe-dot ${i===activeIdx?'active':''}"></div>`).join('')}

function renderContent(){
  if(!SHEETS.length)return;
  const sheet=SHEETS[activeIdx],ci=caseIdxMap[activeIdx],ph=phaseMap[activeIdx],cas=sheet.cases[ci],phase=cas[ph];
  const bCnt=countPhase(cas,'before'),aCnt=countPhase(cas,'after');
  let caseSel='';
  if(sheet.cases.length>1){caseSel=`<div class="case-selector">${sheet.cases.map((c,j)=>`<div class="case-btn ${j===ci?'active':''}" onclick="setCase(${j})">${c.no}차 <span style="font-size:10px;font-weight:400">${c.title}</span></div>`).join('')}</div>`}
  else{caseSel=`<div style="padding:8px 16px 0"><div style="font-size:12px;color:var(--muted);background:var(--card);padding:8px 12px;border-radius:var(--rs);border:1px solid var(--border)"><span style="font-weight:700;color:var(--sub)">${cas.no}차</span><span style="margin-left:6px">${cas.title}</span></div></div>`}
  document.getElementById('contentArea').innerHTML=`${caseSel}
    <div class="phase-toggle" style="margin:6px 16px 0"><div class="phase-btn ${ph==='before'?'active-before':''}" onclick="setPhase('before')">입력 전 <span style="font-size:10px;opacity:.7">(${bCnt})</span></div><div class="phase-btn ${ph==='after'?'active-after':''}" onclick="setPhase('after')">입력 후 <span style="font-size:10px;opacity:.7">(${aCnt})</span></div></div>
    <div class="summary-strip"><div class="ss-item"><div class="ss-num" style="color:var(--cancel-c)">${phase.cancel.length}</div><div class="ss-label">취소</div></div><div class="ss-item"><div class="ss-num" style="color:var(--change-c)">${phase.change.length}</div><div class="ss-label">변경/추가</div></div><div class="ss-item"><div class="ss-num" style="color:var(--supplement-c)">${phase.supplement.length}</div><div class="ss-label">보완</div></div><div class="ss-item"><div class="ss-num" style="color:var(--erp-c)">${phase.erp.length}</div><div class="ss-label">오등록</div></div></div>
    <div class="body">${renderSection('취소','cancel',phase.cancel)}${renderSection('변경/추가','change',phase.change)}${renderSection('보완','supplement',phase.supplement)}${renderSection('오등록(ERP)','erp',phase.erp)}</div>`;
}

function renderSection(label,type,items){
  const icon={cancel:'✕',change:'↔',supplement:'✓',erp:'!'}[type];
  return `<div class="section"><div class="section-head"><div class="section-icon ${type}">${icon}</div><div class="section-label">${label}</div><div class="section-count">${items.length}건</div></div>${items.length===0?'<div class="empty-section">해당 건 없음</div>':items.map((item,i)=>renderCard(type,item,i)).join('')}</div>`;
}

function renderCard(type,item,idx){
  const nm=item.name||'<span class="empty">미입력</span>';
  const noTag=`<div class="card-no">#${idx+1}</div>`;
  const res=item.result||'<span style="color:var(--muted)">미처리</span>';
  if(type==='cancel')return`<div class="card"><div class="card-header"><div class="card-name">${nm}</div>${noTag}</div><div class="card-body"><div class="detail-row"><div class="detail-label">사유</div><div class="detail-value highlight">${item.detail||'-'}</div></div><div class="detail-row"><div class="detail-label">결과</div><div class="detail-value">${res}</div></div></div></div>`;
  if(type==='change'){let ch='';if(item.changeType==='구좌수변경')ch=`<div class="change-detail"><div class="cd-row"><div class="cd-label">변경유형</div><div class="cd-val">구좌수 변경</div></div><div class="cd-row"><div class="cd-label">변경 전</div><div class="cd-val remove">${item.from}</div></div><div class="cd-row"><div class="cd-label">변경 후</div><div class="cd-val add">${item.to}</div></div></div>`;else if(item.changeType==='추가')ch=`<div class="change-detail"><div class="cd-row"><div class="cd-label">유형</div><div class="cd-val add">구좌 추가</div></div><div class="cd-row"><div class="cd-label">추가</div><div class="cd-val add">+${item.addCount}</div></div></div>`;return`<div class="card"><div class="card-header"><div class="card-name">${nm}</div>${noTag}</div><div class="card-body"><div class="detail-row"><div class="detail-label">내용</div><div class="detail-value highlight">${item.detail||'-'}</div></div><div class="detail-row"><div class="detail-label">결과</div><div class="detail-value">${res}</div></div>${ch}</div></div>`}
  if(type==='supplement')return`<div class="card"><div class="card-header"><div class="card-name">${nm}</div><div style="display:flex;align-items:center;gap:6px"><span class="status-pill ${item.done?'done':'undone'}"><span class="dot"></span>${item.done?'보완완료':'미완료'}</span>${noTag}</div></div><div class="card-body"><div class="detail-row"><div class="detail-label">내용</div><div class="detail-value highlight">${item.detail||'-'}</div></div>${item.result?`<div class="detail-row"><div class="detail-label">결과</div><div class="detail-value">${item.result}</div></div>`:''}</div></div>`;
  return`<div class="card"><div class="card-header"><div class="card-name">${nm}</div>${noTag}</div><div class="card-body"><div class="detail-row"><div class="detail-label">내용</div><div class="detail-value highlight">${item.detail||'-'}</div></div><div class="detail-row"><div class="detail-label">결과</div><div class="detail-value">${res}</div></div></div></div>`;
}

function goTo(i){
  if(i<0||i>=SHEETS.length||i===activeIdx)return;
  const el=document.getElementById('contentArea');
  const dir=i>activeIdx?'out-left':'out-right';
  el.classList.add(dir);
  setTimeout(()=>{activeIdx=i;document.getElementById('hSub').textContent=SHEETS[i].date+' 기준';renderTabs();renderDots();renderContent();el.classList.remove(dir);window.scrollTo({top:0,behavior:'smooth'})},150);
}
function setCase(ci){caseIdxMap[activeIdx]=ci;renderContent()}
function setPhase(p){phaseMap[activeIdx]=p;renderContent()}

// Swipe - ONLY on gesture zone bar
let sx=0,cx=0,dragging=false;const TH=50;const zone=document.getElementById('swipeZone');
zone.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;cx=sx;dragging=true;zone.classList.add('dragging')},{passive:true});
zone.addEventListener('touchmove',e=>{if(!dragging)return;cx=e.touches[0].clientX;const d=cx-sx;document.getElementById('arrowL').style.opacity=d>20?'1':'0';document.getElementById('arrowR').style.opacity=d<-20?'1':'0'},{passive:true});
zone.addEventListener('touchend',()=>{if(!dragging)return;dragging=false;zone.classList.remove('dragging');const d=cx-sx;if(d<-TH&&activeIdx<SHEETS.length-1)goTo(activeIdx+1);else if(d>TH&&activeIdx>0)goTo(activeIdx-1);document.getElementById('arrowL').style.opacity='0';document.getElementById('arrowR').style.opacity='0';sx=0;cx=0});
let md=false,msx=0,mcx=0;
zone.addEventListener('mousedown',e=>{md=true;msx=e.clientX;mcx=msx;zone.classList.add('dragging')});
zone.addEventListener('mousemove',e=>{if(!md)return;mcx=e.clientX;const d=mcx-msx;document.getElementById('arrowL').style.opacity=d>20?'1':'0';document.getElementById('arrowR').style.opacity=d<-20?'1':'0'});
zone.addEventListener('mouseup',()=>{if(!md)return;md=false;zone.classList.remove('dragging');const d=mcx-msx;if(d<-TH&&activeIdx<SHEETS.length-1)goTo(activeIdx+1);else if(d>TH&&activeIdx>0)goTo(activeIdx-1);document.getElementById('arrowL').style.opacity='0';document.getElementById('arrowR').style.opacity='0'});
zone.addEventListener('mouseleave',()=>{if(md){md=false;zone.classList.remove('dragging');document.getElementById('arrowL').style.opacity='0';document.getElementById('arrowR').style.opacity='0'}});

loadData();
</script>
</body>
</html>
