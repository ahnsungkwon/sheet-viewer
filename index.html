<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>수정보완건</title>
<link href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f4f3f0;--card:#fff;--text:#1a1a1a;--sub:#555;--muted:#999;--border:#e5e3de;--accent:#2b5592;--accent-light:#eaf1fb;--before-c:#5a6a80;--before-bg:#f0f2f5;--before-bd:#d0d6de;
--after-c:#fff;--after-bg:#e8720a;--after-bd:#d06508;--after-card:#f5a54a;--after-card-bd:#e8920a;--after-text:#fff;--after-sub:rgba(255,255,255,0.8);
--erp-sec-bg:#f0eaff;--erp-sec-bd:#c8b8e8;--erp-sec-c:#5a48a0;--erp-card:#fff;--erp-card-bd:#d8d0ee;
--cancel-c:#c74444;--change-c:#b87a1a;--supp-c:#1e8858;--erp-c:#6060b0;--cancel-bg:#fce8e8;--change-bg:#fef4de;--supp-bg:#e5f5ed;--erp-bg:#eeeef8;--done:#1e8858;--done-bg:#e5f5ed;--undone:#c74444;--undone-bg:#fce8e8;--r:12px;--rs:8px}
[data-theme="dark"]{--bg:#1a1a1e;--card:#26262b;--text:#e8e8e8;--sub:#aaa;--muted:#666;--border:#3a3a40;--accent:#6ba3e8;--accent-light:#1e2d42;--before-c:#8899aa;--before-bg:#22252a;--before-bd:#3a4050;
--after-bg:#a04500;--after-bd:#803800;--after-card:#b85a10;--after-card-bd:#904808;--after-text:#fff;--after-sub:rgba(255,255,255,0.85);
--erp-sec-bg:#2a2540;--erp-sec-bd:#4a4070;--erp-sec-c:#b0a0e0;--erp-card:#322850;--erp-card-bd:#4a3870;
--cancel-c:#e87070;--change-c:#dba050;--supp-c:#50c080;--erp-c:#9090d0;--cancel-bg:#3a2020;--change-bg:#3a2e18;--supp-bg:#1a3020;--erp-bg:#28283a;--done:#50c080;--done-bg:#1a3020;--undone:#e87070;--undone-bg:#3a2020}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;overflow-x:hidden;transition:background .3s,color .3s}
.app{max-width:480px;margin:0 auto;min-height:100vh}
.top{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);transition:background .3s}
.hd{padding:10px 16px 0;display:flex;justify-content:space-between;align-items:center;gap:6px}
.ht{font-size:17px;font-weight:800}.ht em{font-style:normal;color:var(--accent)}
.hs{font-size:11px;color:var(--muted);font-weight:500}
.ha{display:flex;gap:6px}
.hb{cursor:pointer;width:32px;height:32px;border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--card)}
.tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;gap:0;padding:6px 6px 0}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 12px;font-size:14px;font-weight:700;color:var(--muted);border-bottom:3px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab .n{display:inline-block;font-size:11px;font-weight:700;background:var(--border);color:var(--sub);padding:1px 6px;border-radius:7px;margin-left:2px}
.tab.on .n{background:var(--accent);color:#fff}
.sa{display:flex;flex-direction:column;align-items:center;padding:4px 0 6px}
.sz{width:100%;height:36px;display:flex;align-items:center;justify-content:center;cursor:grab;touch-action:pan-y;user-select:none;position:relative}
.szb{width:72px;height:7px;border-radius:4px;background:var(--border);transition:background .15s}
.sz.dg .szb{background:var(--accent)}
.sar{position:absolute;top:50%;transform:translateY(-50%);color:var(--accent);font-size:20px;font-weight:700;opacity:0;transition:opacity .15s}.sar.l{left:24px}.sar.r{right:24px}
.dots{display:flex;gap:4px;justify-content:center}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .2s}
.dot.on{width:16px;border-radius:3px;background:var(--accent)}
.ca{padding:6px 0 40px;transition:opacity .15s,transform .15s}
.ca.ol{opacity:0;transform:translateX(-30px)}.ca.or{opacity:0;transform:translateX(30px)}
.cr{display:flex;gap:6px;padding:6px 16px}
.ct{flex:1;text-align:center;padding:10px 4px;border-radius:var(--r);font-size:15px;font-weight:800;cursor:pointer;background:var(--card);color:var(--muted);border:2px solid var(--border);transition:all .15s}
.ct.on{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.sb{display:flex;align-items:center;justify-content:center;gap:14px;margin:4px 16px;padding:8px 14px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);font-size:13px;font-weight:600}
.si{display:flex;align-items:center;gap:3px}.sn{font-weight:800;font-size:15px}
.ps{margin:6px 16px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.ph{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;font-size:14px;font-weight:700}
.ph.bf{background:var(--before-bg);color:var(--before-c)}
.pc{font-size:11px;font-weight:600;opacity:.7}
.pb{padding:6px 8px}
.ps.af-sec{border-color:var(--after-bd)}
.ps.af-sec .ph{background:var(--after-bg);color:var(--after-c)}
.ps.af-sec .pb{background:var(--after-bg)}
.ps.af-sec .cl{background:rgba(255,255,255,0.25);color:#fff}
.ps.af-sec .ir{background:var(--after-card);border-color:var(--after-card-bd);color:var(--after-text)}
.ps.af-sec .in{color:var(--after-text)}
.ps.af-sec .ig{background:rgba(255,255,255,0.3);color:#fff}
.ps.af-sec .id{color:var(--after-sub)}
.ps.af-sec .is.dn{background:rgba(255,255,255,0.3);color:#fff}
.ps.af-sec .is.un{background:rgba(255,255,255,0.25);color:#ffe0c0}
.ps.erp-sec{border-color:var(--erp-sec-bd)}
.ps.erp-sec .ph{background:var(--erp-sec-bg);color:var(--erp-sec-c)}
.ps.erp-sec .pb{background:var(--erp-sec-bg)}
.ps.erp-sec .cl{background:rgba(90,72,160,0.15);color:var(--erp-sec-c)}
.ps.erp-sec .ir{background:var(--erp-card);border-color:var(--erp-card-bd)}
.ps.erp-sec .in{color:var(--erp-sec-c)}
.ps.erp-sec .ig{background:rgba(90,72,160,0.12);color:var(--erp-sec-c)}
.ps.erp-sec .id{color:var(--sub)}
.cg{margin-bottom:4px}
.cl{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;margin-bottom:2px}
.cl.cancel{background:var(--cancel-bg);color:var(--cancel-c)}.cl.change{background:var(--change-bg);color:var(--change-c)}.cl.supplement{background:var(--supp-bg);color:var(--supp-c)}.cl.erp{background:var(--erp-bg);color:var(--erp-c)}
.ir{display:flex;align-items:center;gap:6px;padding:5px 10px;margin:2px 0;background:var(--card);border-radius:var(--rs);border:1px solid var(--border);font-size:13px;transition:background .3s}
.in{font-weight:700;flex-shrink:0}
.ig{font-size:10px;font-weight:700;background:var(--accent-light);color:var(--accent);padding:1px 5px;border-radius:4px;flex-shrink:0}
.id{color:var(--sub);font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.is{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}
.is.dn{background:var(--done-bg);color:var(--done)}.is.un{background:var(--undone-bg);color:var(--undone)}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="hd">
      <div class="ht"><em>수정보완건</em></div>
      <div class="hs" id="hs"></div>
      <div class="ha"><div class="hb" onclick="tog()"><span id="ti">🌙</span></div><div class="hb" onclick="load()">↻</div></div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="sa">
      <div class="sz" id="sz"><span class="sar l" id="al">◂</span><div class="szb"></div><span class="sar r" id="ar">▸</span></div>
      <div class="dots" id="dots"></div>
    </div>
  </div>
  <div id="msg"></div>
  <div class="ca" id="ca"></div>
</div>
<script>
var API='https://script.google.com/macros/s/AKfycbzayQOd-IY6NCcKxR3q_JjVCBgJK16-4KjzunlQpsb97CTYmfOGsVhOAqgckotvw0wK8g/exec';
var S=[],ti=0,ci=[];

function tog(){var h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');document.getElementById('ti').textContent=d?'🌙':'☀️';try{localStorage.setItem('t',d?'l':'d')}catch(e){}}
try{if(localStorage.getItem('t')==='d'){document.documentElement.setAttribute('data-theme','dark');window.addEventListener('DOMContentLoaded',function(){document.getElementById('ti').textContent='☀️'})}}catch(e){}

function pn(raw){if(!raw)return{n:'',g:0};var s=String(raw).trim(),m=s.match(/^(\d+)(.+)$/);return m?{n:m[2],g:parseInt(m[1])}:{n:s,g:0}}

async function load(){
  var m=document.getElementById('msg');
  m.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--muted)"><div style="width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px"></div><span style="font-size:13px">불러오는 중...</span></div>';
  try{
    var r=await fetch(API);var d=await r.json();
    if(!d||!d.length){m.innerHTML='<div style="text-align:center;padding:60px;color:var(--muted)">데이터 없음</div>';return}
    S=d;ti=0;ci=S.map(function(){return 0});
    if(S.length)document.getElementById('hs').textContent=S[0].date+' · '+S[0].org;
    m.innerHTML='';ren();
  }catch(e){m.innerHTML='<div style="text-align:center;padding:60px;color:var(--cancel-c)"><span style="font-size:13px">불러오기 실패</span><br><br><button onclick="load()" style="padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer">다시 시도</button></div>'}
}

function cnt(s){var n=0;s.cases.forEach(function(c){['before','after'].forEach(function(p){['cancel','change','supplement','erp'].forEach(function(k){n+=c[p][k].length})})});return n}
function cntp(c,p){var n=0;['cancel','change','supplement','erp'].forEach(function(k){n+=c[p][k].length});return n}

function ren(){
  if(!S.length)return;
  document.getElementById('tabs').innerHTML=S.map(function(s,i){return'<div class="tab '+(i===ti?'on':'')+'" onclick="go('+i+')">'+s.date+' '+s.org+'<span class="n">'+cnt(s)+'</span></div>'}).join('');
  setTimeout(function(){var a=document.querySelector('.tab.on');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},80);
  document.getElementById('dots').innerHTML=S.map(function(_,i){return'<div class="dot '+(i===ti?'on':'')+'"></div>'}).join('');
  rc();
}

function rc(){
  var sh=S[ti],c=ci[ti],cas=sh.cases[c];
  var ac={cancel:0,change:0,supplement:0,erp:0};
  ['before','after'].forEach(function(p){['cancel','change','supplement','erp'].forEach(function(k){ac[k]+=cas[p][k].length})});

  var ch='';
  if(sh.cases.length>1)ch='<div class="cr">'+sh.cases.map(function(x,j){return'<div class="ct '+(j===c?'on':'')+'" onclick="pc('+j+')">'+x.no+'차</div>'}).join('')+'</div>';

  var sm='<div class="sb"><div class="si"><span class="sn" style="color:var(--cancel-c)">'+ac.cancel+'</span><span style="color:var(--muted)">취소</span></div><div class="si"><span class="sn" style="color:var(--change-c)">'+ac.change+'</span><span style="color:var(--muted)">변경</span></div><div class="si"><span class="sn" style="color:var(--supp-c)">'+ac.supplement+'</span><span style="color:var(--muted)">보완</span></div><div class="si"><span class="sn" style="color:var(--erp-c)">'+ac.erp+'</span><span style="color:var(--muted)">오등록</span></div></div>';

  var bfData={cancel:cas.before.cancel,change:cas.before.change,supplement:cas.before.supplement};
  var afData={cancel:cas.after.cancel,change:cas.after.change,supplement:cas.after.supplement};
  var bfTot=bfData.cancel.length+bfData.change.length+bfData.supplement.length;
  var afTot=afData.cancel.length+afData.change.length+afData.supplement.length;
  var bfHtml=bfTot>0?buildBox(bfData,'bf',bfTot,'입력 전',''):'';
  var afHtml=afTot>0?buildBox(afData,'af',afTot,'입력 후',' af-sec'):'';

  var allErp=cas.before.erp.concat(cas.after.erp);
  var erpHtml=allErp.length>0?buildErpBox(allErp):'';

  document.getElementById('hs').textContent=sh.date+' · '+sh.org;
  document.getElementById('ca').innerHTML=ch+sm+bfHtml+afHtml+erpHtml;
}

function buildBox(items,cls,tot,lbl,extra){
  var b='';
  b+=bc('취소','cancel',items.cancel);
  b+=bc('변경/추가','change',items.change);
  b+=bc('보완','supplement',items.supplement);
  if(!b)return'';
  return'<div class="ps'+extra+'"><div class="ph '+cls+'"><span>'+lbl+'</span><span class="pc">'+tot+'건</span></div><div class="pb">'+b+'</div></div>';
}

function buildErpBox(items){
  var rows=items.map(function(it){
    var p=pn(it.name);
    var nm=p.n?'<span class="in">'+p.n+'</span>':'<span class="in" style="opacity:0.6">미입력</span>';
    var gz=p.g?'<span class="ig">'+p.g+'구좌</span>':'';
    var dt=it.detail?'<span class="id">'+it.detail+'</span>':'';
    return'<div class="ir">'+nm+gz+dt+'</div>';
  }).join('');
  return'<div class="ps erp-sec"><div class="ph"><span>오등록 (ERP)</span><span class="pc">'+items.length+'건</span></div><div class="pb">'+rows+'</div></div>';
}

function bc(lbl,type,items){
  if(!items||!items.length)return'';
  var rows=items.map(function(it){
    var p=pn(it.name);
    var nm=p.n?'<span class="in">'+p.n+'</span>':'<span class="in" style="color:var(--muted)">미입력</span>';
    var gz=p.g?'<span class="ig">'+p.g+'구좌</span>':'';
    if(type==='change'){var dt=it.detail?'<span class="id">'+it.detail+'</span>':'';return'<div class="ir">'+nm+gz+dt+'</div>'}
    if(type==='cancel'){var dt2=it.detail?'<span class="id">'+it.detail+'</span>':'';return'<div class="ir">'+nm+gz+dt2+'</div>'}
    if(type==='supplement'){var dn=it.done||(it.result&&it.result.indexOf('완료')>-1);var st=dn?'<span class="is dn">등록완료</span>':'<span class="is un">미완료</span>';var dt3=it.detail?'<span class="id">'+it.detail+'</span>':'';return'<div class="ir">'+nm+gz+dt3+st+'</div>'}
    return'';
  }).join('');
  return'<div class="cg"><div class="cl '+type+'">'+lbl+' '+items.length+'</div>'+rows+'</div>';
}

function go(i){if(i<0||i>=S.length||i===ti)return;var el=document.getElementById('ca'),dir=i>ti?'ol':'or';el.classList.add(dir);setTimeout(function(){ti=i;ren();el.classList.remove(dir);window.scrollTo({top:0,behavior:'smooth'})},150)}
function pc(i){ci[ti]=i;rc()}

var sx=0,cx=0,dr=false,TH=50,z=document.getElementById('sz');
z.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;cx=sx;dr=true;z.classList.add('dg')},{passive:true});
z.addEventListener('touchmove',function(e){if(!dr)return;cx=e.touches[0].clientX;var d=cx-sx;document.getElementById('al').style.opacity=d>20?'1':'0';document.getElementById('ar').style.opacity=d<-20?'1':'0'},{passive:true});
z.addEventListener('touchend',function(){if(!dr)return;dr=false;z.classList.remove('dg');var d=cx-sx;if(d<-TH&&ti<S.length-1)go(ti+1);else if(d>TH&&ti>0)go(ti-1);document.getElementById('al').style.opacity='0';document.getElementById('ar').style.opacity='0';sx=0;cx=0});
var md=false,ms=0,mc=0;
z.addEventListener('mousedown',function(e){md=true;ms=e.clientX;mc=ms;z.classList.add('dg')});
z.addEventListener('mousemove',function(e){if(!md)return;mc=e.clientX;var d=mc-ms;document.getElementById('al').style.opacity=d>20?'1':'0';document.getElementById('ar').style.opacity=d<-20?'1':'0'});
z.addEventListener('mouseup',function(){if(!md)return;md=false;z.classList.remove('dg');var d=mc-ms;if(d<-TH&&ti<S.length-1)go(ti+1);else if(d>TH&&ti>0)go(ti-1);document.getElementById('al').style.opacity='0';document.getElementById('ar').style.opacity='0'});
z.addEventListener('mouseleave',function(){if(md){md=false;z.classList.remove('dg');document.getElementById('al').style.opacity='0';document.getElementById('ar').style.opacity='0'}});

load();
</script>
</body>
</html>
